name: Generate Trophy
on:
  schedule:
    - cron: "0 0 * * *"   # Roz raat ko update
  workflow_dispatch:       # Manual run bhi kar sako

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: soulteary/github-profile-trophy-action@v2
        with:
          github-user: ethdevvinay
          theme: tokyonight
          column: 4
          rank: "SSS,SS,S,AAA"
          output: "./assets/trophy.svg"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit Trophy
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ./assets/trophy.svg
          git commit -m "Update trophy" || echo "No changes"
          git push
